services:
  # ─────────────────────────────────────────────
  # Ollama — Local LLM Runtime + Auto Model Pull
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: heypico-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    # Remove the deploy block below if you don't have an NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/sh", "-c", "/bin/ollama serve & sleep 5 && ollama pull ${DEFAULT_MODEL:-qwen2.5:7b}; wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q '${DEFAULT_MODEL:-qwen2.5:7b}'"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  # ─────────────────────────────────────────────
  # Redis — Cache Layer for Google Maps responses
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: heypico-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme_redis_pw}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_pw}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — FastAPI Google Maps Proxy
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heypico-backend
    restart: unless-stopped
    # No public port — accessed via nginx at /api/*
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis_pw}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Nginx — Reverse Proxy (single entry point)
  # Routes /api/* → backend, everything else → Open WebUI
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: heypico-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      open-webui:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Open WebUI — Chat Frontend + Tool Orchestrator
  # + Auto-registers tools & admin on first start
  # ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: heypico-open-webui
    restart: unless-stopped
    # No public port — accessed via nginx on :3000
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_MODELS=heypico-maps
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_MESSAGE_RATING=true
      - BACKEND_URL=http://backend:8000
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@heypico.ai}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      ollama:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - open_webui_data:/app/backend/data
      - ./openwebui-tools:/app/backend/data/tools
      - ./setup:/app/setup:ro
    entrypoint: ["/bin/bash", "/app/setup/entrypoint.sh"]

volumes:
  ollama_data:
  redis_data:
  open_webui_data:

networks:
  default:
    name: heypico-network
